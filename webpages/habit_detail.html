<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ habit.name }}</title>
    <link rel="stylesheet" href="../static/style.css">

    <script>
let seconds = 0;
let interval = null;

function updateDisplay() {
    let hrs = String(Math.floor(seconds / 3600)).padStart(2, '0');
    let mins = String(Math.floor((seconds % 3600) / 60)).padStart(2, '0');
    let secs = String(seconds % 60).padStart(2, '0');

    document.getElementById("timer").innerText = `${hrs}:${mins}:${secs}`;
}

function startTimer() {
    if (interval) return; // prevent multiple timers
    interval = setInterval(() => {
        seconds++;
        updateDisplay();
    }, 1000);
}

function pauseTimer() {
    clearInterval(interval);
    interval = null;
}

function resetTimer() {
    pauseTimer();
    seconds = 0;
    updateDisplay();
}

function saveTime() {
    document.getElementById("timeInput").value = seconds;
}
</script>
</head>
<body>
    <div class="container">
        <h1>{{ habit.name }}</h1>

        <section class="panel">
            <h2>Timer</h2>
            <div id="timer" class="timer">00:00:00</div>

            <button onclick="startTimer()">Start</button>
            <button onclick="pauseTimer()">Pause</button>
            <button onclick="resetTimer()">Reset</button>

            <form action="{{ url_for('save_session', habit_id=habit.id) }}" method="POST">
                <input type="hidden" name="time" id="timeInput">
                <button type="submit" onclick="saveTime()">Save Session</button>
            </form>
        </section>

        <section class="panel">
            <h2>Past Data</h2>
            <table class="habit-table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Time Spent</th>
                        <th>Completion</th>
                    </tr>
                </thead>
                <tbody>
                    {% for entry in habit.history %}
                    <tr>
                        <td>{{ entry.date }}</td>
                        <td>{{ format_time(entry.time_spent) }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>

            <form action="{{ url_for('delete_habit', habit_id=habit.id) }}" method="POST">
                <button type="submit" class="delete-btn" onclick="return confirm('Are you sure you want to delete this habit?')">Delete Habit</button>
            </form>
        </section>

        <a class="back-arrow" href="{{ url_for('home') }}">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" class="mi-solid mi-arrow-back" viewBox="0 0 24 24">
            <path d="M19 11H7.83l4.88-4.88c.39-.39.39-1.03 0-1.42a.996.996 0 0 0-1.41 0l-6.59 6.59a.996.996 0 0 0 0 1.41l6.59 6.59a.996.996 0 1 0 1.41-1.41L7.83 13H19c.55 0 1-.45 1-1s-.45-1-1-1"/>
            </svg>
        </a>
    </div>
</body>
</html>
